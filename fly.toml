# fly.toml app configuration file generated for math-bnr45w on 2026-02-07

app = "math-bnr45w"
primary_region = "cdg"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[deploy]
  # This command runs automatically before the new version goes live.
  # It fixes the "no such table" error by creating the database tables.
  release_command = "sh -c 'python manage.py migrate && python manage.py seed_data'"
